name: Capture Demo Screenshots

on:
  workflow_run:
    workflows: ["Deploy Avnac Vue \u2013 Live Demo"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          cat > capture.mjs << 'SCRIPT'
          import { chromium } from '@playwright/test';
          import { mkdirSync } from 'fs';
          mkdirSync('public/screenshots', { recursive: true });
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1280, height: 800 });

          // 1. Editor overview - blank canvas
          await page.goto('https://venmail.github.io/avnac-vue/create', { waitUntil: 'networkidle' });
          await page.waitForTimeout(2000);
          await page.screenshot({ path: 'public/screenshots/editor-overview.png', fullPage: false });

          // 2. Text tool active
          await page.click('[title="Text"], button:has-text("T")').catch(() => {});
          const canvas = page.locator('#app canvas').first();
          if (await canvas.count()) await canvas.click({ position: { x: 300, y: 250 } });
          await page.waitForTimeout(800);
          await page.screenshot({ path: 'public/screenshots/text-tool.png' });

          // 3. Image panel
          await page.keyboard.press('Escape');
          const imageBtn = page.locator('[title="Images"], [aria-label="Images"]').first();
          if (await imageBtn.count()) await imageBtn.click();
          else await page.locator('button').nth(6).click();
          await page.waitForTimeout(800);
          await page.screenshot({ path: 'public/screenshots/image-panel.png' });

          // 4. Chart panel
          await page.keyboard.press('Escape');
          const chartBtn = page.locator('[title="Chart"], [aria-label="Chart"]').first();
          if (await chartBtn.count()) await chartBtn.click();
          else await page.locator('button').nth(9).click();
          await page.waitForTimeout(800);
          await page.screenshot({ path: 'public/screenshots/chart-panel.png' });

          // 5. Diagrams panel
          await page.keyboard.press('Escape');
          const diagBtn = page.locator('[title="Diagram"], [aria-label="Diagram"]').first();
          if (await diagBtn.count()) await diagBtn.click();
          else await page.locator('button').nth(10).click();
          await page.waitForTimeout(800);
          await page.screenshot({ path: 'public/screenshots/diagrams-panel.png' });

          await browser.close();
          SCRIPT
          node capture.mjs

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/
          git diff --cached --quiet || git commit -m "ci: update demo screenshots [skip ci]"
          git push
