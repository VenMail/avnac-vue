name: Capture Demo Screenshots

on:
  workflow_run:
    workflows: ["Deploy Avnac Vue \u2013 Live Demo"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Playwright in isolated dir
        # Install in /tmp/pw to avoid conflict with project's peer deps
        run: |
          mkdir -p /tmp/pw
          cd /tmp/pw
          npm init -y
          npm install --legacy-peer-deps @playwright/test
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          mkdir -p public/screenshots
          cat > /tmp/capture.mjs << 'SCRIPT'
          import { chromium } from '/tmp/pw/node_modules/@playwright/test/index.mjs';
          import { mkdirSync } from 'fs';
          const OUTPUT = process.env.OUTPUT_DIR;
          mkdirSync(OUTPUT, { recursive: true });
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1280, height: 800 });

          const BASE = 'https://venmail.github.io/avnac-vue';

          // 1. Editor overview
          await page.goto(BASE + '/create', { waitUntil: 'networkidle', timeout: 30000 });
          await page.waitForTimeout(3000);
          await page.screenshot({ path: OUTPUT + '/editor-overview.png' });

          // 2. Text tool
          const toolbar = page.locator('button').nth(1);
          await toolbar.click().catch(() => {});
          await page.locator('canvas').first().click({ position: { x: 300, y: 250 } }).catch(() => {});
          await page.waitForTimeout(1000);
          await page.screenshot({ path: OUTPUT + '/text-tool.png' });

          // 3. Image panel (button index 5)
          await page.keyboard.press('Escape');
          await page.locator('button').nth(5).click().catch(() => {});
          await page.waitForTimeout(800);
          await page.screenshot({ path: OUTPUT + '/image-panel.png' });

          // 4. Chart panel (button index 8)
          await page.keyboard.press('Escape');
          await page.locator('button').nth(8).click().catch(() => {});
          await page.waitForTimeout(800);
          await page.screenshot({ path: OUTPUT + '/chart-panel.png' });

          // 5. Diagrams panel (button index 9)
          await page.keyboard.press('Escape');
          await page.locator('button').nth(9).click().catch(() => {});
          await page.waitForTimeout(800);
          await page.screenshot({ path: OUTPUT + '/diagrams-panel.png' });

          await browser.close();
          console.log('Screenshots saved to', OUTPUT);
          SCRIPT
          OUTPUT_DIR="$(pwd)/public/screenshots" node /tmp/capture.mjs

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/
          git diff --cached --quiet || git commit -m "ci: update demo screenshots [skip ci]"
          git push
