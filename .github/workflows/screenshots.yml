name: Capture Demo Screenshots
on:
  workflow_run:
    workflows: ["Deploy Avnac Vue \u2013 Live Demo"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --prefix /tmp/pw --legacy-peer-deps playwright
          /tmp/pw/node_modules/.bin/playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          mkdir -p public/screenshots
          node - << 'EOF'
          const { chromium } = require('/tmp/pw/node_modules/playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            const base = 'https://venmail.github.io/avnac-vue';
            // Editor view
            await page.goto(base + '/create', { waitUntil: 'networkidle' });
            await page.waitForTimeout(3000);
            await page.screenshot({ path: 'public/screenshots/editor.png', fullPage: false });
            // Try to capture with toolbar visible
            await page.screenshot({ path: 'public/screenshots/toolbar.png', fullPage: false });
            await browser.close();
            console.log('Screenshots captured!');
          })();
          EOF

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/
          git diff --cached --quiet || git commit -m "chore: update demo screenshots [skip ci]"
          git push
