name: Capture Demo Screenshots
on:
  workflow_run:
    workflows: ["Deploy Avnac Vue \u2013 Live Demo"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --prefix /tmp/pw --legacy-peer-deps playwright
          /tmp/pw/node_modules/.bin/playwright install --with-deps chromium

      - name: Capture screenshots
        run: |
          mkdir -p public/screenshots
          node - << 'EOF'
          const { chromium } = require('/tmp/pw/node_modules/playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            const base = 'https://venmail.github.io/avnac-vue';
            // Editor overview
            await page.goto(base + '/create', { waitUntil: 'networkidle' });
            await page.waitForTimeout(4000);
            await page.screenshot({ path: 'public/screenshots/editor-overview.png' });
            // Text tool - click text button if present
            try {
              const textBtn = await page.$('[title*="Text"], [aria-label*="text"], button[data-tool="text"]');
              if (textBtn) { await textBtn.click(); await page.waitForTimeout(1000); }
            } catch(e) {}
            await page.screenshot({ path: 'public/screenshots/text-tool.png' });
            // Image panel
            try {
              const imgBtn = await page.$('[title*="Image"], [aria-label*="image"], button[data-tool="image"]');
              if (imgBtn) { await imgBtn.click(); await page.waitForTimeout(1000); }
            } catch(e) {}
            await page.screenshot({ path: 'public/screenshots/image-panel.png' });
            // Chart panel
            try {
              const chartBtn = await page.$('[title*="Chart"], [aria-label*="chart"]');
              if (chartBtn) { await chartBtn.click(); await page.waitForTimeout(1000); }
            } catch(e) {}
            await page.screenshot({ path: 'public/screenshots/chart-panel.png' });
            // Diagrams panel
            try {
              const diagBtn = await page.$('[title*="Diagram"], [aria-label*="diagram"]');
              if (diagBtn) { await diagBtn.click(); await page.waitForTimeout(1000); }
            } catch(e) {}
            await page.screenshot({ path: 'public/screenshots/diagrams-panel.png' });
            await browser.close();
            console.log('Screenshots saved to', process.cwd() + '/public/screenshots');
          })();
          EOF

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/
          git diff --cached --quiet || git commit -m "ci: update demo screenshots [skip ci]"
          git pull --rebase origin main
          git push
